name: 🤖 AI 新闻日报

on:
  schedule:
    # 每天 8:03 AM 北京时间 = 0:03 AM UTC
    - cron: "3 0 * * *"
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write # 允许推送更改到仓库

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 安装依赖
        run: npm ci

      - name: 🔍 检查更新开关
        id: check
        run: |
          ACTIVE=$(node --input-type=commonjs -e "console.log(require('./docs/config.json').active)")
          echo "active=$ACTIVE" >> $GITHUB_OUTPUT
          if [ "$ACTIVE" = "true" ]; then
            echo "✅ 更新开关已开启，继续执行"
          else
            echo "⏸️ 更新开关已关闭，跳过本次生成"
          fi

      - name: 🤖 生成日报
        if: steps.check.outputs.active == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npm run generate

      - name: 📝 提交更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📰 自动日报"
          commit_author: "AI News Bot 🤖 <bot@ai-news.local>"
          file_pattern: "docs/"
          commit_options: "--allow-empty"

      - name: 📊 构建日志
        run: |
          echo "✅ 日报生成完成"
          echo "📅 生成时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
